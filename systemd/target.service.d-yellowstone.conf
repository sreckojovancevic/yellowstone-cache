# Drop-in za target.service (samo za AUTO režim).
#
# Instalacija:
#   mkdir -p /etc/systemd/system/target.service.d
#   cp target.service.d-yellowstone.conf \
#      /etc/systemd/system/target.service.d/yellowstone.conf
#   systemctl daemon-reload
#
# Efekat: LIO fizički ne može da se pokrene dok Yellowstone
# nije sastavio i verifikovao cache.

[Unit]
After=yellowstone.service
Requires=yellowstone.service
